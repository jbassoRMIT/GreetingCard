<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styles.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Bigelow+Rules&family=Caveat:wght@400..700&family=Fascinate&family=Michroma&family=Playwrite+HU:wght@100..400&family=Press+Start+2P&family=Roboto+Mono:ital,wght@0,100..700;1,100..700&family=Roboto:ital,wght@1,600&family=Sixtyfour&family=UnifrakturMaguntia&family=VT323&family=WDXL+Lubrifont+SC&display=swap" rel="stylesheet">
    <title>Greeting</title>
</head>
<body>
    <div class="content">
        <h2>Greeting card</h2>
        <form action="">
            <label for="fName">Please write your name:</label>
            <input type="text" name="fName" id="fName"><br>
            <label for="favColor1">Your favourite color?:</label>
            <input type="color" name="favColor1" id="favColor1"><br>
            <label for="favColor2">Your 2nd favourite color?:</label>
            <input type="color" name="favColor2" id="favColor2"><br>
            <label for="backgroundType">What's your favourite type of background?</label>
            <select name="backgroundType" id="backgroundType">
                <option value="linear">Linear</option>
                <option value="radial">Radial</option>
                <option value="conic">Conic</option>
            </select><br>
            <label for="birthday">What's your birthday?:</label>
            <input type="date" name="birthday" id="birthday"><br>
            <button type="submit">Submit</button>
            <button type="reset" id="resetButton">reset</button>
        </form>
        <p class="formDisplay"></p>
        <p class="birthdayUpdate"></p>
    </div>
    <script src="./index.js"></script>
</body>
</html>
